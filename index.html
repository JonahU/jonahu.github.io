<!doctype html>
<html lang="en">

    <meta charset="utf-8" />

  </head>

  <body>
    <h1>Jonah Usadi ( ° ∀ ° )ﾉﾞ</h1>

    <h1 id="counter-display"></h1>
    <button onclick="incrementCounter()">+</button>
    <button onclick="decrementCounter()">-</button>
    <button onclick="resetCounter()">Reset</button>
    <button onclick="displayCode()">Show Source</button>
    <pre><code id="counter-code" style="display:none"></code></pre>

    <script>
      const initialVal = 0;
      const display = document.getElementById("counter-display");
      const updateDisplay = (i) => (display.textContent = `Counter: ${i}`);
      updateDisplay(initialVal);

      WebAssembly.instantiateStreaming(fetch("counter.wasm")).then(
        ({ instance }) => {
          const { increment, decrement, set } = instance.exports;
          set(initialVal);
          window.resetCounter = () => updateDisplay(set(initialVal));
          window.incrementCounter = () => updateDisplay(increment());
          window.decrementCounter = () => updateDisplay(decrement());
        },
      );

      let codeLoaded = false;
      window.displayCode = () => {
        const code = document.getElementById("counter-code");
        const button = document.querySelector(
          "button[onclick='displayCode()']",
        );

        if (code.style.display === "none") {
          if (!codeLoaded) {
            fetch("counter.c")
              .then((res) => res.text())
              .then((text) => {
                code.textContent = text;
                codeLoaded = true;
              });
          }
          code.style.display = "block";
          button.textContent = "Hide Source";
        } else {
          code.style.display = "none";
          button.textContent = "Show Source";
        }
      };
    </script>
